name: Sentiment Tracker (Fear & Greed)

on:
  schedule:
    # Weekly, Monday 9 PM UTC (~4-5 PM Eastern). Adjust if you want M/W/F
    # to match the AI scorecard cadence instead of weekly.
    - cron: '0 21 * * 1'
  workflow_dispatch: {}  # manual trigger from the Actions tab, no terminal needed

permissions:
  contents: write

jobs:
  update-sentiment-log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run tracker
        run: python fetch_sentiment.py

      - name: Commit updated log
        run: |
          git config user.name "sentiment-tracker-bot"
          git config user.email "actions@github.com"
          git add sentiment_history.csv
          git diff --staged --quiet || git commit -m "Update sentiment log $(date -u +%Y-%m-%d)"
          git push
