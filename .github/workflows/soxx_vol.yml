name: SOXX Volatility Tracker

on:
  schedule:
    # Runs 9:00 PM UTC Mon/Wed/Fri = 4-5 PM Eastern (after market close),
    # adjust the cron if you want a different cadence or time.
    - cron: '0 21 * * 1,3,5'
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab if you ever want to, no terminal needed

permissions:
  contents: write

jobs:
  update-vol-log:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run tracker
        run: python soxx_vol_tracker.py

      - name: Commit updated log
        run: |
          git config user.name "soxx-vol-bot"
          git config user.email "actions@github.com"
          git add soxx_vol_log.csv soxx_vol_latest.json
          git diff --staged --quiet || git commit -m "Update SOXX vol log $(date -u +%Y-%m-%d)"
          git push
